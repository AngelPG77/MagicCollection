spring.application.name=MagicCollectionSpring

spring.datasource.url=jdbc:mysql://localhost:3307/mtg_db
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Security Configuration
jwt.secret=${JWT_SECRET:Q3JHcV9GZlR1cYV0V3b0Z0cU5lS2pRZ1h6bFh4YlE=}
jwt.expiration=${JWT_EXPIRATION:86400000}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

server.port=8080

# Timeout de peticiones asíncronas (5 minutos)
spring.mvc.async.request-timeout=300000

# Reduce tamaño de payloads grandes (índice de cartas)
server.compression.enabled=true
server.compression.mime-types=application/json,application/octet-stream,text/plain
server.compression.min-response-size=1024

# Más margen para conexiones largas durante sincronización/descarga
server.tomcat.connection-timeout=300000

# Observabilidad de índices por idioma
magic.index.max-staleness-hours=48
management.endpoints.web.exposure.include=health,metrics
management.endpoint.health.show-details=always
